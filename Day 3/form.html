<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="/">


      <label for="name">Name:</label>
      <input type="text" placeholder="Write your name" id="name" >
      <br>

    <label for="email">Email</label>
    <input type="email" placeholder="Enter your Email" id="email">
    <br>

    <label for="password">Password</label>
    <input type="password" placeholder="Enter your Password">
    <br>

    <fieldset>
        <legend>Are you sure?</legend>

        <label for="yes">Yes</label>
        <input type="radio" id="yes" name="confirm" >

        <label for="no">No</label>
        <input type="radio" id="no" name="confirm">
    </fieldset>


    <fieldset>
        <legend>Select course</legend>

        <label for="python">Python</label>
        <input type="checkbox" id="python" >
        <br>

        <label for="java">java</label>
        <input type="checkbox" id="java" >
        <br>

        <label for="C++">C++</label>
        <input type="checkbox" id="C++" >
        <br>

         <label for="Cyber">Cyber</label>
        <input type="checkbox" id="Cyber" >

    </fieldset>
    <label for="number">Number</label>
    <input type="number" id="number" placeholder="Enter your Number" min="0" >
    <br>
    <label for="date">Date</label>
    <input type="date" id="date">
    <br>

    <label for="time">time</label>
    <input type="time" id="time">
    <br>

    <label for="datetime">DateTime</label>
    <input type="datetime-local" id="datetime">
    <br>
    <label for="range">Range</label>
    <input type="range" id="range">

    <br>
    <label for="color">color</label>
    <input type="color" id="color">
    <br>
    <label for="file">File</label>
    <input type="file" id="file">
<br>
    <label for="search">Search</label>
    <input type="search" id="search">


    <br>
    
    
    <button type="submit">Submit</button>

    </form>
  </body>
</html>
