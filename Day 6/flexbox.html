<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      .child {
        width: 100px;

        border: 2px solid red;
        text-align: center;
        border-radius: 12pxz2;
        
      }

      .parent {
        border: 10px solid blue;

        align-items: end;
        /* flex-wrap: wrap-reverse; */
        flex-wrap: wrap;
        /* row-gap: 10px; */

        align-items: center ;
      }
    </style>

        <li>justify-content= start,center, list, space- around,evenly, between</li>
